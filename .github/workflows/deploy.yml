name: ai deploy

# main 브랜치 push 시 실행
on:
  push:
    branches: [ main ]

jobs:
  deploy:

    # GitHub 제공 Ubuntu runner
    runs-on: ubuntu-latest

    steps:

    # repository 코드 checkout
    - name: Checkout repository
      uses: actions/checkout@v3

    # AWS 인증 설정
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # AWS ECR 로그인
    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v1

    # AI Docker 이미지 빌드
    - name: Build Docker image
      run: |
        docker build -t mohaeng-ai .

    # ECR push를 위한 태그 설정
    - name: Tag Docker image
      run: |
        docker tag mohaeng-ai:latest \
        ${{ secrets.ECR_REGISTRY }}/mohaeng-ai:latest

    # Docker 이미지 ECR에 push
    - name: Push Docker image
      run: |
        docker push \
        ${{ secrets.ECR_REGISTRY }}/mohaeng-ai:latest

    # EC2 접속 후 컨테이너 배포
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}    
        username: ${{ secrets.EC2_USER }}  
        key: ${{ secrets.EC2_SSH_KEY }}   
        script: |

          # docker-compose 위치 이동
          cd deploy

          # ECR 로그인
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login \
          --username AWS \
          --password-stdin \
          ${{ secrets.ECR_REGISTRY }}

          # 최신 AI 이미지 pull
          docker compose pull ai

          # AI 컨테이너 재시작
          docker compose up -d ai --no-deps